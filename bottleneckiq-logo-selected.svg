<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BottleneckIQ selected logo</title>
  <desc id="desc">Warehouse flow logo with silver network lanes, mint bottleneck highlight, and a continuous BottleneckIQ wordmark.</desc>
  <defs>
    <linearGradient id="silverLine" x1="116" y1="118" x2="910" y2="194" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D6DCE6"/>
      <stop offset="1" stop-color="#BFC8D6"/>
    </linearGradient>
    <linearGradient id="silverLine2" x1="196" y1="226" x2="926" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#CDD5E0"/>
      <stop offset="1" stop-color="#E3E9F1"/>
    </linearGradient>
    <linearGradient id="mintLine" x1="254" y1="188" x2="884" y2="82" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60DFC2"/>
      <stop offset="1" stop-color="#79F7B7"/>
    </linearGradient>
    <linearGradient id="mintFill" x1="898" y1="270" x2="1110" y2="304" gradientUnits="userSpaceOnUse">
      <stop stop-color="#59E1C2"/>
      <stop offset="1" stop-color="#7AF7B7"/>
    </linearGradient>
    <linearGradient id="greyFill" x1="78" y1="270" x2="906" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D5DBE5"/>
      <stop offset="1" stop-color="#BFC7D4"/>
    </linearGradient>
    <filter id="mintGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.3529 0 0 0 0 0.8784 0 0 0 0 0.7608 0 0 0 0.30 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#AFC7C8" flood-opacity="0.08"/>
    </filter>
  </defs>

